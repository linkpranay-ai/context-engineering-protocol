name: Feature request
description: Suggest an improvement or missing capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would a good solution look like?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - installer
        - context package generation
        - code graph consumption
        - markdown indexing
        - runtime adapters
        - documentation
        - other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: extra
    attributes:
      label: Additional context
